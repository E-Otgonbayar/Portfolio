        const ThemeCtx = createContext();
        function ThemeProvider({ children }) {
            const [dark, setDark] = useState(() => {
                const saved = localStorage.getItem('theme');
                return saved ? saved === 'dark' : true;
            });
            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                localStorage.setItem('theme', dark ? 'dark' : 'light');
            }, [dark]);
            return (
                <ThemeCtx.Provider value={{ dark, toggle: () => setDark(d => !d) }}>
                    {children}
                </ThemeCtx.Provider>
            );
        }
        function useTheme() { return useContext(ThemeCtx); }

        const LangCtx = createContext();
        function LangProvider({ children }) {
            const [lang, setLang] = useState(() => localStorage.getItem('lang') || 'en');

                setLang(l => {
                    const next = l === 'en' ? 'mn' : 'en';
                    localStorage.setItem('lang', next);
                    document.documentElement.lang = next;

        function useTypingEffect(lines, speed = 28, linePause = 500) {
            const [displayed, setDisplayed] = useState([]);
            const linesKey = lines.map(l => l.text).join('|');
            useEffect(() => {
                setDisplayed([]);
                let lineIdx = 0, charIdx = 0;
                let cancelled = false;
                function tick() {
                    if (cancelled || lineIdx >= lines.length) return;
                    const line = lines[lineIdx];
                    if (charIdx === 0 && line.type === 'cmd') {
                        setDisplayed(prev => [...prev, { type: 'cmd', text: '' }]);
                    }
                    if (charIdx < line.text.length) {
                        const ch = line.text[charIdx];
                        const delay = ch === ' ' ? speed * 0.5 : speed;
                        setTimeout(() => {
                            if (cancelled) return;
                            setDisplayed(prev => {
                                const updated = [...prev];
                                const last = updated[updated.length - 1];
                                if (last && last.type === line.type && last.text.length < line.text.length) {
                                    updated[updated.length - 1] = { ...last, text: last.text + ch };
                                } else {
                                    updated.push({ type: line.type, text: ch });
                                }
                                return updated;
                            });
                            charIdx++;
                            tick();
                        }, delay);
                    } else {
                        charIdx = 0;
                        lineIdx++;
                        setTimeout(tick, linePause);
                    }
                }
                const t = setTimeout(tick, 400);
                return () => { cancelled = true; clearTimeout(t); };
            }, [linesKey]);
            return displayed;
        }

        function useScrollReveal() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
                document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            });
        }

        function useScrollProgress() {
            const [progress, setProgress] = useState(0);
            useEffect(() => {
                const onScroll = () => {
                    const h = document.documentElement.scrollHeight - window.innerHeight;
                    setProgress(h > 0 ? (window.scrollY / h) * 100 : 0);
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return progress;
        }

        function useScrollTop(showAt = 400) {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const onScroll = () => setShow(window.scrollY > showAt);
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, [showAt]);
            return show;
        }

        function useToast() {
            const [toast, setToast] = useState(null);
            const show = useCallback((msg, type = 'success') => {
                setToast({ msg, type, id: Date.now() });
                setTimeout(() => setToast(null), 3500);

                                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                                            background: activeCompany === co.id ? 'var(--accent)' : 'var(--accent-soft)',
                                            color: activeCompany === co.id ? 'var(--accent-text)' : 'var(--accent)',
                                            fontSize: 13, transition: 'all 0.2s',
                                        }}>
                                            <i className={co.icon}></i>
                                        </div>
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <p style={{ fontSize: 13, fontWeight: 600, margin: 0, lineHeight: 1.2, color: activeCompany === co.id ? 'var(--accent)' : 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{co.name}</p>
                                            <p className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)', margin: 0 }}>{co.date}</p>
                                        </div>
                                        {co.current && (
                                            <div style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--accent)', flexShrink: 0, boxShadow: '0 0 0 2px var(--accent-soft)' }}></div>
                                        )}
                                    </button>
                                ))}
                            </div>

                            {/* Right */}
                            <div style={{ flex: 1, padding: '20px 28px', overflowY: 'auto' }}>
                                <div style={{ marginBottom: 20, paddingBottom: 16, borderBottom: '1px solid var(--border)' }}>
                                    <p className="font-mono" style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 4 }}>
                                        {active.name} · {active.type}
                                    </p>
                                    <p style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)', margin: 0, lineHeight: 1.2 }}>{active.role}</p>
                                    <p className="font-mono" style={{ fontSize: 12, color: 'var(--accent)', marginTop: 4 }}>
                                        {active.date}
                                        {active.current && (
                                            <span style={{ marginLeft: 8, padding: '1px 7px', borderRadius: 5, fontSize: 10, background: 'var(--accent)', color: 'var(--accent-text)', fontWeight: 600 }}>{ex.currentBadge}</span>
                                        )}
                                    </p>
                                </div>
                                <p className="font-mono" style={{ fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 14 }}>{ex.whatLabel}</p>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                                    {filtered.map((exp, i) => (
                                        <div key={i} style={{ display: 'flex', gap: 14, paddingBottom: 20 }}>
                                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', paddingTop: 5 }}>
                                                <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', flexShrink: 0, border: '2px solid var(--bg-alt)', boxShadow: '0 0 0 2px var(--accent)' }}></div>
                                                {i < filtered.length - 1 && <div style={{ width: 1, flex: 1, marginTop: 5, background: 'var(--border)' }}></div>}
                                            </div>
                                            <div style={{ flex: 1, paddingBottom: 4 }}>
                                                <p style={{ fontSize: 14, fontWeight: 600, color: 'var(--text)', marginBottom: 5, lineHeight: 1.3 }}>{exp.title}</p>
                                                <p style={{ fontSize: 13, color: 'var(--text-sec)', lineHeight: 1.6, marginBottom: 8 }}>{exp.desc}</p>
                                                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                                                    {exp.tags.map(tag => <span key={tag} className="tag">{tag}</span>)}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        /* ── Contact ── */
        function Contact() {
            const { t } = useLang();
            const ct = t.contact;
            const { toast, show: showToast } = useToast();
            const [form, setForm] = useState({ name: '', email: '', message: '' });
            const [errors, setErrors] = useState({});
            useScrollReveal();

            const validate = () => {
                const errs = {};
                if (!form.name.trim()) errs.name = ct.errName;
                if (!form.email.trim()) errs.email = ct.errEmail;
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) errs.email = ct.errEmailFmt;
                if (!form.message.trim()) errs.message = ct.errMsg;
                return errs;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                const errs = validate();
                setErrors(errs);
                if (Object.keys(errs).length > 0) { showToast(ct.errFields, 'error'); return; }
                showToast(ct.toastOk);
                setForm({ name: '', email: '', message: '' });
                setErrors({});
            };

            const handleChange = (field) => (e) => {
                setForm(prev => ({ ...prev, [field]: e.target.value }));
                if (errors[field]) setErrors(prev => ({ ...prev, [field]: undefined }));
            };

            const socialLinks = [
                { icon: 'fa-brands fa-github',   label: 'GitHub',   href: '#' },
                { icon: 'fa-brands fa-linkedin',  label: 'LinkedIn', href: 'https://www.linkedin.com/in/otgonbayar-enkhbold-134222269/' },
                { icon: 'fa-solid fa-envelope',   label: 'Email',    href: 'mailto:ogoo0624@gmail.com' },
            ];

            return (
                <section id="contact" className="py-24 relative">
                    <div className="max-w-6xl mx-auto px-5">
                        <div className="reveal">
                            <p className="section-label">{ct.label}</p>
                            <h2 className="section-title mb-4">{ct.title}</h2>
                            <p className="text-base mb-10" style={{ color: 'var(--text-sec)', maxWidth: 520 }}>{ct.subtitle}</p>
                        </div>
                        <div className="grid md:grid-cols-5 gap-10">
                            <form onSubmit={handleSubmit} className="md:col-span-3 space-y-5 reveal reveal-delay-1" noValidate>
                                <div>
                                    <label className="block text-sm font-medium mb-2" style={{ color: 'var(--text)' }}>{ct.nameLabel}</label>
                                    <input type="text" className="form-input" placeholder={ct.namePlaceholder} value={form.name} onChange={handleChange('name')} />
                                    {errors.name && <p className="text-xs mt-1" style={{ color: '#ef4444' }}>{errors.name}</p>}
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-2" style={{ color: 'var(--text)' }}>{ct.emailLabel}</label>
                                    <input type="email" className="form-input" placeholder={ct.emailPlaceholder} value={form.email} onChange={handleChange('email')} />
                                    {errors.email && <p className="text-xs mt-1" style={{ color: '#ef4444' }}>{errors.email}</p>}
                                </div>
                                <div>
                                    <label className="block text-sm font-medium mb-2" style={{ color: 'var(--text)' }}>{ct.msgLabel}</label>
                                    <textarea className="form-input" rows="5" placeholder={ct.msgPlaceholder} value={form.message} onChange={handleChange('message')} style={{ resize: 'vertical' }}></textarea>
                                    {errors.message && <p className="text-xs mt-1" style={{ color: '#ef4444' }}>{errors.message}</p>}
                                </div>
                                <button type="submit" className="btn-primary">
                                    <i className="fa-solid fa-paper-plane"></i> {ct.send}
                                </button>
                            </form>
                            <div className="md:col-span-2 reveal reveal-delay-2">
                                <div className="card p-6 space-y-5">
                                    <p className="font-semibold text-sm" style={{ color: 'var(--text)' }}>{ct.socialTitle}</p>
                                    {socialLinks.map(link => (
                                        <a key={link.label} href={link.href}
                                            className="flex items-center gap-4 p-3 rounded-lg transition-all duration-200 group"
                                            style={{ color: 'var(--text-sec)', textDecoration: 'none' }}
                                            onMouseEnter={e => { e.currentTarget.style.background = 'var(--accent-soft)'; e.currentTarget.style.color = 'var(--accent)'; }}
                                            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = 'var(--text-sec)'; }}
                                        >
                                            <div className="skill-icon" style={{ width: 36, height: 36, fontSize: 15 }}><i className={link.icon}></i></div>
                                            <span className="text-sm font-medium">{link.label}</span>
                                            <i className="fa-solid fa-arrow-right text-xs ml-auto" style={{ color: 'var(--accent)', opacity: 0.5 }}></i>
                                        </a>
                                    ))}
                                    <div style={{ marginTop: 20, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
                                        <p className="font-mono text-xs mb-2" style={{ color: 'var(--text-muted)' }}>{ct.eduLabel}</p>
                                        <p className="text-sm font-medium" style={{ color: 'var(--text)' }}>{ct.eduDegree}</p>
                                        <p className="text-xs" style={{ color: 'var(--text-muted)' }}>{ct.eduSub}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <Toast data={toast} />
                </section>
            );
        }

        /* ── Footer ── */
        function Footer() {
            const { t } = useLang();
            return (
                <footer style={{ borderTop: '1px solid var(--border)', background: 'var(--bg-alt)', transition: 'background 0.35s, border-color 0.35s' }}>
                    <div className="max-w-6xl mx-auto px-5 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <p className="font-mono text-xs" style={{ color: 'var(--text-muted)' }}>
                            &copy; {new Date().getFullYear()} {t.footer.copy}
                        </p>
                        <p className="font-mono text-xs" style={{ color: 'var(--text-muted)' }}>
                            {t.footer.built} <span style={{ color: 'var(--accent)' }}>&lt;dev /&gt;</span>
                        </p>
                    </div>
                </footer>
            );
        }

        /* ===================================================
           App
        =================================================== */
        function App() {
            const progress = useScrollProgress();
            const showTop = useScrollTop(400);
            useScrollReveal();
            return (
                <ThemeProvider>
                    <LangProvider>
                        <ScrollProgressBar progress={progress} />
                        <ScrollToTop visible={showTop} />
                        <Navbar />
                        <main>
                            <Hero />
                            <About />
                            <Skills />
                            <Education />
                            <Experience />
                            <Contact />
                        </main>
                        <Footer />
                    </LangProvider>
                </ThemeProvider>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
