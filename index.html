    <style>
        /* ===== Theme Variables ===== */
        :root {
            --bg: #f2f5f3;
            --bg-alt: #e8ede9;
            --card: #ffffff;
            --card-hover: #f6f9f7;
            --border: #cdd8d2;
            --text: #1a2420;
            --text-sec: #3d5248;
            --text-muted: #6b8078;
            --accent: #00b248;
            --accent-hover: #009e3f;
            --accent-soft: rgba(0,178,72,0.07);
            --accent-glow: rgba(0,178,72,0.15);
            --accent-text: #fff;
            --terminal-bg: #0a0d0b;
            --terminal-border: #1a2b22;
            --terminal-prompt: #00e676;
            --terminal-text: #b0c0b6;
            --terminal-output: #e4ebe7;
            --shadow: 0 4px 24px rgba(0,0,0,0.06);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
        }
        .dark {
            --bg: #090c0a;
            --bg-alt: #0f1411;
            --card: #141a17;
            --card-hover: #1a221e;
            --border: #1e2e27;
            --text: #e4ebe7;
            --text-sec: #a3b5ab;
            --text-muted: #5e7569;
            --accent: #00e676;
            --accent-hover: #69f0ae;
            --accent-soft: rgba(0,230,118,0.06);
            --accent-glow: rgba(0,230,118,0.12);
            --accent-text: #090c0a;
            --terminal-bg: #060908;
            --terminal-border: #152018;
            --terminal-prompt: #00e676;
            --terminal-text: #7a9488;
            --terminal-output: #c8d8ce;
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
        }

        /* ===== Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; scroll-padding-top: 80px; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background-color 0.35s ease, color 0.35s ease;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-alt); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ===== Selection ===== */
        ::selection { background: var(--accent); color: var(--accent-text); }

        /* ===== Background Grid ===== */
        .bg-grid {
            background-image:
                radial-gradient(circle at 1px 1px, var(--border) 0.5px, transparent 0);
            background-size: 32px 32px;
        }

        /* ===== Scroll Progress ===== */
        .scroll-progress {
            position: fixed; top: 0; left: 0; height: 2px;
            background: var(--accent); z-index: 9999;
            transition: width 0.05s linear;
            box-shadow: 0 0 8px var(--accent-glow);
        }

        /* ===== Navbar Glass ===== */
        .nav-glass {
            background: color-mix(in srgb, var(--bg) 80%, transparent);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            transition: background 0.35s, border-color 0.35s;
        }

        /* ===== Terminal ===== */
        .terminal {
            background: var(--terminal-bg);
            border: 1px solid var(--terminal-border);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 60px var(--accent-glow);
        }
        .terminal-bar {
            background: var(--terminal-border);
            padding: 10px 14px;
            display: flex; gap: 7px; align-items: center;
        }
        .terminal-dot { width: 11px; height: 11px; border-radius: 50%; }
        .terminal-body {
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.75;
            min-height: 220px;
            color: var(--terminal-text);
        }
        .terminal-body .prompt { color: var(--terminal-prompt); }
        .terminal-body .cmd { color: var(--terminal-text); }
        .terminal-body .output { color: var(--terminal-output); }
        .cursor-blink {
            display: inline-block; width: 8px; height: 16px;
            background: var(--terminal-prompt);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom; margin-left: 2px;
        }
        /* Scanline overlay */
        .terminal-scanlines {
            position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px
            );
            border-radius: 10px;
        }

        /* ===== Keyframes ===== */
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }
        @keyframes pulseRing {
            0% { transform: scale(0.9); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        /* ===== Reveal on Scroll ===== */
        .reveal {
            opacity: 0; transform: translateY(30px);
            transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
        }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }

        /* ===== Accent Glow ===== */
        .accent-glow {
            position: absolute; border-radius: 50%; pointer-events: none;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(50px);
        }

        /* ===== Card Base ===== */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: background 0.3s, border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: var(--shadow);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent);
        }

        /* ===== Skill Card ===== */
        .skill-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.3s ease;
            cursor: default;
        }
        .skill-card:hover {
            border-color: var(--accent);
            background: var(--accent-soft);
            transform: translateX(4px);
        }
        .skill-icon {
            width: 38px; height: 38px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 16px; flex-shrink: 0;
            transition: background 0.3s, color 0.3s;
        }
        .skill-card:hover .skill-icon {
            background: var(--accent);
            color: var(--accent-text);
        }

        /* ===== Project Card ===== */
        .project-card {
            position: relative; overflow: hidden;
        }
        .project-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .project-card:hover::before { opacity: 1; }

        /* ===== Timeline ===== */
        .timeline-line {
            position: absolute; left: 15px; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(to bottom, var(--accent), var(--border));
        }
        .timeline-dot {
            position: absolute; left: 8px; top: 6px;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--accent);
            z-index: 2; transition: background 0.3s;
        }
        .timeline-item:hover .timeline-dot {
            background: var(--accent);
        }

        /* ===== Tabs ===== */
        .tab-btn {
            padding: 10px 24px; border-radius: 8px; font-weight: 600;
            font-size: 14px; cursor: pointer; border: 1px solid transparent;
            background: transparent; color: var(--text-muted);
            transition: all 0.25s ease;
            font-family: 'DM Sans', sans-serif;
        }
        .tab-btn:hover { color: var(--text); background: var(--accent-soft); }
        .tab-btn.active {
            background: var(--accent); color: var(--accent-text);
            border-color: var(--accent);
        }

        /* ===== Form Input ===== */
        .form-input {
            width: 100%; padding: 14px 16px; border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card); color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .form-input::placeholder { color: var(--text-muted); }

        /* ===== Button ===== */
        .btn-primary {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 10px; font-weight: 600;
            font-size: 15px; border: none; cursor: pointer;
            background: var(--accent); color: var(--accent-text);
            transition: all 0.25s ease; font-family: 'DM Sans', sans-serif;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: 10px; font-weight: 600;
            font-size: 15px; cursor: pointer;
            background: transparent; color: var(--accent);
            border: 1.5px solid var(--accent);
            transition: all 0.25s ease; font-family: 'DM Sans', sans-serif;
        }
        .btn-outline:hover {
            background: var(--accent-soft);
            transform: translateY(-2px);
        }

        /* ===== Toast ===== */
        .toast-enter { animation: slideInRight 0.35s ease forwards; }
        .toast-exit { animation: slideOutRight 0.3s ease forwards; }

        /* ===== Section Title ===== */
        .section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px; font-weight: 500;
            color: var(--accent); letter-spacing: 0.5px;
            text-transform: uppercase; margin-bottom: 8px;
        }
        .section-title {
            font-size: clamp(28px, 4vw, 40px); font-weight: 700;
            color: var(--text); line-height: 1.2;
        }

        /* ===== Mobile Menu ===== */
        .mobile-menu-overlay {
            position: fixed; inset: 0; z-index: 90;
            background: color-mix(in srgb, var(--bg) 95%, transparent);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 32px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .mobile-menu-overlay.open { opacity: 1; pointer-events: all; }
        .mobile-menu-overlay a {
            font-size: 24px; font-weight: 600; color: var(--text);
            text-decoration: none; transition: color 0.2s;
        }
        .mobile-menu-overlay a:hover { color: var(--accent); }

        /* ===== Scroll to Top ===== */
        .scroll-top-btn {
            position: fixed; bottom: 28px; right: 28px; z-index: 50;
            width: 44px; height: 44px; border-radius: 12px;
            background: var(--card); border: 1px solid var(--border);
            color: var(--accent); font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; opacity: 0; transform: translateY(10px);
            pointer-events: none; box-shadow: var(--shadow);
        }
        .scroll-top-btn.visible {
            opacity: 1; transform: translateY(0); pointer-events: all;
        }
        .scroll-top-btn:hover {
            background: var(--accent); color: var(--accent-text);
            border-color: var(--accent);
        }

        /* ===== Tag pill ===== */
        .tag {
            display: inline-block; padding: 4px 12px; border-radius: 6px;
            font-size: 12px; font-weight: 500; font-family: 'JetBrains Mono', monospace;
            background: var(--accent-soft); color: var(--accent);
            border: 1px solid color-mix(in srgb, var(--accent) 20%, transparent);
        }

        /* ===== Highlight Card ===== */
        .highlight-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 24px; text-align: center;
            transition: all 0.3s ease;
        }
        .highlight-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .highlight-icon {
            width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 14px;
            display: flex; align-items: center; justify-content: center;
            background: var(--accent-soft); color: var(--accent); font-size: 20px;
        }

        /* ===== Reduced motion ===== */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
            .reveal { opacity: 1; transform: none; }
        }
    </style>
</head>

        /* ===================================================
           Theme Context
        =================================================== */
        const ThemeCtx = createContext();
        function ThemeProvider({ children }) {
            const [dark, setDark] = useState(() => {
                const saved = localStorage.getItem('theme');
                return saved ? saved === 'dark' : true;
            });
            useEffect(() => {
                document.documentElement.classList.toggle('dark', dark);
                localStorage.setItem('theme', dark ? 'dark' : 'light');
            }, [dark]);
            return (
                <ThemeCtx.Provider value={{ dark, toggle: () => setDark(d => !d) }}>
                    {children}
                </ThemeCtx.Provider>
            );
        }
        function useTheme() { return useContext(ThemeCtx); }

        /* ===================================================
           Custom Hooks
        =================================================== */
        // Typing effect for terminal
        function useTypingEffect(lines, speed = 28, linePause = 500) {
            const [displayed, setDisplayed] = useState([]);
            useEffect(() => {
                let lineIdx = 0, charIdx = 0;
                const linesCopy = [...displayed]; // start fresh only on mount
                setDisplayed([]);
                function tick() {
                    if (lineIdx >= lines.length) return;
                    const line = lines[lineIdx];
                    if (charIdx === 0 && line.type === 'cmd') {
                        setDisplayed(prev => [...prev, { type: 'cmd', text: '' }]);
                    }
                    if (charIdx < line.text.length) {
                        const ch = line.text[charIdx];
                        const delay = ch === ' ' ? speed * 0.5 : speed;
                        setTimeout(() => {
                            setDisplayed(prev => {
                                const updated = [...prev];
                                const last = updated[updated.length - 1];
                                if (last && last.type === line.type && last.text.length < line.text.length) {
                                    updated[updated.length - 1] = { ...last, text: last.text + ch };
                                } else {
                                    updated.push({ type: line.type, text: ch });
                                }
                                return updated;
                            });
                            charIdx++;
                            tick();
                        }, delay);
                    } else {
                        charIdx = 0;
                        lineIdx++;
                        setTimeout(tick, linePause);
                    }
                }
                const startTimeout = setTimeout(tick, 600);
                return () => clearTimeout(startTimeout);
            }, []);
            return displayed;
        }

        // Scroll reveal observer
        function useScrollReveal() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
                document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
                return () => observer.disconnect();
            });
        }

        // Scroll progress
        function useScrollProgress() {
            const [progress, setProgress] = useState(0);
            useEffect(() => {
                const onScroll = () => {
                    const h = document.documentElement.scrollHeight - window.innerHeight;
                    setProgress(h > 0 ? (window.scrollY / h) * 100 : 0);
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return progress;
        }

        // Show scroll-top button
        function useScrollTop(showAt = 400) {
            const [show, setShow] = useState(false);
            useEffect(() => {
                const onScroll = () => setShow(window.scrollY > showAt);
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, [showAt]);
            return show;
        }

        // Toast state
        function useToast() {
            const [toast, setToast] = useState(null);
            const show = useCallback((msg, type = 'success') => {
                setToast({ msg, type, id: Date.now() });
                setTimeout(() => setToast(null), 3500);
            }, []);
            return { toast, show };
        }

                                            <div className="skill-icon" style={{ width: 36, height: 36, fontSize: 15 }}>
                                                <i className={link.icon}></i>
                                            </div>
                                            <span className="text-sm font-medium">{link.label}</span>
                                            <i className="fa-solid fa-arrow-right text-xs ml-auto opacity-0 group-hover:opacity-100 transition-opacity" style={{ color: 'var(--accent)' }}></i>
                                        </a>
                                    ))}

                                    <div style={{ marginTop: 20, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
                                        <p className="font-mono text-xs mb-2" style={{ color: 'var(--text-muted)' }}>EDUCATION</p>
                                        <p className="text-sm font-medium" style={{ color: 'var(--text)' }}>Bachelor's in Information Systems</p>
                                        <p className="text-xs" style={{ color: 'var(--text-muted)' }}>3rd Year &mdash; National University of Mongolia</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <Toast data={toast} />
                </section>
            );
        }

        // --- Footer ---
        function Footer() {
            return (
                <footer style={{ borderTop: '1px solid var(--border)', background: 'var(--bg-alt)', transition: 'background 0.35s, border-color 0.35s' }}>
                    <div className="max-w-6xl mx-auto px-5 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <p className="font-mono text-xs" style={{ color: 'var(--text-muted)' }}>
                            &copy; {new Date().getFullYear()} Otgonbayar Enkhbold
                        </p>
                        <p className="font-mono text-xs" style={{ color: 'var(--text-muted)' }}>
                            Designed & built with <span style={{ color: 'var(--accent)' }}>&lt;dev /&gt;</span>
                        </p>
                    </div>
                </footer>
            );
        }

        /* ===================================================
           App Root
        =================================================== */
        function App() {
            const progress = useScrollProgress();
            const showTop = useScrollTop(400);
            useScrollReveal();

            return (
                <ThemeProvider>
                    <ScrollProgressBar progress={progress} />
                    <ScrollToTop visible={showTop} />
                    <Navbar />
                    <main>
                        <Hero />
                        <About />
                        <Skills />
                        <Projects />
                        <Experience />
                        <Contact />
                    </main>
                    <Footer />
                </ThemeProvider>
            );
        }

        /* ===================================================
           Mount
        =================================================== */
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
